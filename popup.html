<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="popup.css" />
    <title>MAX 出勤记录</title>
  </head>
  <body>
    <header class="hdr">
      <div class="hdr-left">
        <img src="icons/icon48.png" alt="" class="logo" />
        <div>
          <div class="hdr-title">MAX 出勤记录</div>
          <div class="hdr-sub" id="liveStatus">空闲</div>
        </div>
      </div>
      <div class="live-time" id="liveTime">00:00</div>
    </header>

    <section class="stats">
      <div class="stat">
        <div class="stat-num" id="statSessions">0</div>
        <div class="stat-label">通话场次</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statOnline">0</div>
        <div class="stat-label">当前在线</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="statPeople">0</div>
        <div class="stat-label">累计人次</div>
      </div>
    </section>

    <div class="toolbar">
      <span class="toolbar-title">通话记录</span>
      <div class="toolbar-btns">
        <button id="settingsBtn" class="tbtn">设置</button>
        <button id="calibBtn" class="tbtn">校准</button>
        <button id="exportBtn" class="tbtn">导出CSV</button>
        <button id="clearBtn" class="tbtn danger">清空</button>
      </div>
    </div>

    <details class="settings-panel" id="settingsPanel">
      <summary>数据与识别设置</summary>
      <div class="settings-body">
        <label class="field">
          <span>最多保留场次</span>
          <input type="number" id="optMaxSessions" min="10" max="500" value="200" />
        </label>
        <label class="field">
          <span>保留天数（0=不限）</span>
          <input type="number" id="optRetentionDays" min="0" max="3650" value="90" />
        </label>
        <label class="field">
          <span>扫描间隔（毫秒）</span>
          <input type="number" id="optScanMs" min="1000" max="30000" step="500" value="3000" />
        </label>
        <label class="field field-check">
          <input type="checkbox" id="optDebug" />
          <span>调试模式（控制台输出 [MAXCT] 日志）</span>
        </label>
        <label class="field field-full">
          <span>自定义 CSS 选择器（每行一个，用于识别参会者卡片）</span>
          <textarea id="optSelectors" rows="3" placeholder="例如：&#10;[data-user-id]&#10;.participant-tile"></textarea>
        </label>
        <button id="saveSettingsBtn" class="tbtn save-settings">保存设置</button>
        <p class="settings-hint">双击历史记录中的姓名可编辑；编辑后不会被自动识别覆盖。</p>
      </div>
    </details>

    <div class="sessions" id="sessions">
      <div class="empty" id="emptyHint">
        暂无记录。<br />打开 MAX 网页版加入通话后，插件会从网络/DOM 读取<strong>用户 ID</strong>并记录在线时长。
      </div>
    </div>

    <footer class="ftr">
      <span>数据仅保存在本机 · <a href="#" id="privacyLink">隐私说明</a></span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
