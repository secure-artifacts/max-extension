name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 本扩展为纯静态文件，无需构建。将运行时文件归集到 dist/，
      # 保证解压后根目录即 manifest.json。
      - name: Package Extension
        run: |
          mkdir -p dist
          cp manifest.json inject.js content.js overlay.css background.js \
             popup.html popup.css popup.js README.md dist/
          cp -r icons dist/
          cd dist
          zip -r ../max-extension-${{ github.ref_name }}.zip .

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
